name: yes_native_vendor
description: Yes Native Vendor Portal App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  excel: ^4.0.6
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  image_picker: ^1.2.2
  uuid: ^4.5.3
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.3.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#2C5E35"
  adaptive_icon_foreground: "assets/images/leaf_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # To use Poppins, add it to assets or use google_fonts package.
  # For production, add:
  # google_fonts: ^6.1.0
  # and replace fontFamily: 'Poppins' with GoogleFonts.poppins()
