name: yes_native_vendor
description: Yes Native Vendor Portal App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # To use Poppins, add it to assets or use google_fonts package.
  # For production, add:
  # google_fonts: ^6.1.0
  # and replace fontFamily: 'Poppins' with GoogleFonts.poppins()
